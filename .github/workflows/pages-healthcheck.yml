name: Pages Healthcheck

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check deployed page is reachable
        run: |
          curl -fSL --retry 3 --retry-delay 3 https://glen200392.github.io/org-gererator/ -o page.html

      - name: Validate key content exists
        run: |
          grep -q "<canvas id=\"previewCanvas\"" page.html
          grep -q "企業組織圖產生器\|Corporate Org Chart Generator" page.html

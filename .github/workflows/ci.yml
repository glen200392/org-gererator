name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Fast checks: typecheck + lint ──
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck all packages
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

  # ── Build all packages (depends on check) ──
  build:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm turbo build

      - name: Verify core dist output
        run: |
          test -f packages/core/dist/index.js
          test -f packages/core/dist/index.d.ts

  # ── Unit tests (depends on build) ──
  test-unit:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm turbo test

  # ── Legacy smoke tests (Playwright) ──
  test-e2e-legacy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Validate legacy app files
        run: |
          test -f apps/legacy/index.html
          test -f index.html

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Legacy smoke tests
        run: pnpm --filter @orgchart/legacy test:smoke
